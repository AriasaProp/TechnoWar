name: Build & Publish Android Artifacts

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type (release/debug)'
        required: true
        default: 'debug' # Nilai default dapat disesuaikan

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check
      uses: actions/checkout@v3
    - name: Setup JDK 11
      uses: actions/setup-java@v3.4.1
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2.4.2
      with:
        gradle-version: 8.1.1
    - name: Build Gradle
      run: |
        echo "buildType=${{ github.event.inputs.build-type }}" >> $GITHUB_ENV
        echo "build type ${{ env.buildType }}"
        gradle :android:build -P"${{ env.buildType }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: buildAPK
        path: ${{ github.workspace }}/android/build/outputs/apk/${{ env.buildType }}/android-${{ env.buildType }}.apk
