name: Auto-Check

on:
  push:
    paths:
      - 'core/**'
      - 'android/**'
      - 'desktop/**'
      - 'tools/**'

jobs: 
  tools-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Filter Changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          base: ${{ github.ref }}
          filters: |
            tools:
              - 'tools/**'
      - name: Test Run
        if: ${{ steps.changes.outputs.tools == 'true' }}
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.4
          arguments: :tools:runc
      - name: Upload Tools
        if: steps.changes.outputs.tools
        uses: actions/upload-artifact@v3.1.2
        with:
          name: converted
          path: ${{ github.workspace }}/tools/converted
  core-test:
    runs-on: ubuntu-latest
  	outputs:
  		android: ${{ steps.changes.outputs.android }}
  		desktop: ${{ steps.changes.outputs.desktop }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Filter Changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          base: ${{ github.ref }}
          filters: |
            core:
              - 'core/**'
              - 'android/**'
              - 'desktop/**'
            android:
              - 'android/**'
            desktop:
              - 'desktop/**'
      - name: Gradle Check Core
        if: ${{ steps.changes.outputs.core == 'true' }}
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.4
          arguments: :core:check 
  android-test:
    runs-on: ubuntu-latest
    needs: core-test
    if: ${{ needs.core-test.outputs.android == 'true'}}
    steps:
      - uses: actions/checkout@v3.5.2 
      - name: Gradle Check Android
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.4
          arguments: :android:build -Prelease
      - name: Upload Android
        uses: actions/upload-artifact@v3.1.2
        with:
          name: APK
          path: ${{ github.workspace }}/android/build/outputs/apk/release/android-release.apk 
  desktop-test:
    runs-on: ubuntu-latest
    needs: core-test
    if: ${{ needs.core-test.outputs.desktop == 'true' }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Gradle Build Desktop
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.4
          arguments: :desktop:build
      - name: Upload Desktop
        uses: actions/upload-artifact@v3.1.2
        with:
          name: EXE
          path: ${{ github.workspace }}/desktop/build 
