name: Auto Update

on:
  push:
    paths:
      - 'core/**'
      - 'android/**'
      - 'desktop/**'
      - 'tools/**'

jobs:
  try:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: echo ${{ github.event.paths }}
  tools:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.paths, 'tools/') }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Test Run
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :tools:runc
      - name: Upload Tools
        uses: actions/upload-artifact@v3.1.2
        with:
          name: converted
          path: ${{ github.workspace }}/tools/converted
  core:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.paths, 'core/') || contains(github.event.paths, 'android/') || contains(github.event.paths, 'desktop/') }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Gradle Check Core
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :core:check 
  android:
    runs-on: ubuntu-latest
    needs: core
    if: ${{ contains(github.event.paths, 'android/') }}
    steps:
      - uses: actions/checkout@v3.5.2 
      - name: Setup JDK 17
        uses: actions/setup-java@v3.11.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Gradle Check Android
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :android:build -Prelease
      - name: Upload Android
        uses: actions/upload-artifact@v3.1.2
        with:
          name: APK
          path: ${{ github.workspace }}/android/build/outputs/apk/release/android-release.apk 
  desktop:
    runs-on: ubuntu-latest
    needs: core
    if: ${{ contains(github.event.paths, 'desktop/') }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Gradle Build Desktop
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :desktop:build
      - name: Upload Desktop
        uses: actions/upload-artifact@v3.1.2
        with:
          name: EXE
          path: ${{ github.workspace }}/desktop/build 
