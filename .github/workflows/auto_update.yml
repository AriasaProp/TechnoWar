name: Auto Update

on:
  push:
    paths:
      - 'core/**'
      - 'android/**'
      - 'desktop/**'
      - 'tools/**'

jobs: 
  check-changes:
    runs-on: ubuntu-latest
    outputs:
        tools: ${{ steps.changes.outputs.tools }}
        core: ${{ steps.changes.outputs.core }}
        android: ${{ steps.changes.outputs.android }}
        desktop: ${{ steps.changes.outputs.desktop }}
    steps:
      - uses: actions/checkout@v3.5.2
			- name: Filter Changes
			  id: changes
			  run: |
          tools_changed=$(echo "${{ toJson(glob('tools/**')) }}" | jq -e 'length > 0')
          echo "::set-output name=tools_changed::$tools_changed"
          
          core_changed=$(echo "${{ toJson(glob('core/**')) }}" | jq -e 'length > 0')
          
          if [ "$core_changed" = true ]; then
            echo "::set-output name=android_changed::true"
            echo "::set-output name=desktop_changed::true"
          else
            echo "::set-output name=android_changed::$(echo "${{ toJson(glob('android/**')) }}" | jq -e 'length > 0')"
            echo "::set-output name=desktop_changed::$(echo "${{ toJson(glob('desktop/**')) }}" | jq -e 'length > 0')"
          fi
          
          echo "::set-output name=core_changed::$core_changed"

  tools:
    runs-on: ubuntu-latest
    needs: check-changes
    if: ${{ needs.check-changes.outputs.tools == 'true'}}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Test Run
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :tools:runc
      - name: Upload Tools
        uses: actions/upload-artifact@v3.1.2
        with:
          name: converted
          path: ${{ github.workspace }}/tools/converted
  core:
    runs-on: ubuntu-latest
    needs: check-changes
    if: ${{ needs.check-changes.outputs.core == 'true'}}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Gradle Check Core
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :core:check 
  android:
    runs-on: ubuntu-latest
    needs: check-changes
    if: ${{ needs.check-changes.outputs.android == 'true'}}
    steps:
      - uses: actions/checkout@v3.5.2 
      - name: Setup JDK 17
        uses: actions/setup-java@v3.11.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Gradle Check Android
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :android:build -Prelease
      - name: Upload Android
        uses: actions/upload-artifact@v3.1.2
        with:
          name: APK
          path: ${{ github.workspace }}/android/build/outputs/apk/release/android-release.apk 
  desktop:
    runs-on: ubuntu-latest
    needs: check-changes
    if: ${{ needs.check-changes.outputs.desktop == 'true' }}
    steps:
      - uses: actions/checkout@v3.5.2
      - name: Gradle Build Desktop
        uses: gradle/gradle-build-action@v2.4.2
        with:
          gradle-version: 8.6
          arguments: :desktop:build
      - name: Upload Desktop
        uses: actions/upload-artifact@v3.1.2
        with:
          name: EXE
          path: ${{ github.workspace }}/desktop/build 
