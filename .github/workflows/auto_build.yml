name: Auto Build

on:
  workflow_dispatch:
  push:
    # Ignore pushes that have [skip ci] in the commit message
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths:
      - '.github/workflows/auto_build.yml'
      - 'core/**'
      - 'android/**'
      - 'linux/**'
      - 'windows/**'

jobs:
  format-core:
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.changes.outputs.windows }}
      linux: ${{ steps.changes.outputs.linux }}
      android: ${{ steps.changes.outputs.android }}
      core: ${{ steps.changes.outputs.core }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Filtering
        id: changes
        uses: dorny/paths-filter@v3.0.1
        with:
          list-files: shell
          filters: |
            core:
              - 'core/**'
            android:
              - 'android/**'
            linux:
              - 'linux/**'
            windows:
              - 'windows/**'

       - name: Run Core Test
        if: steps.changes.outputs.core == 'true'
        run: |
          cd core
          make tests

  android:
    runs-on: ubuntu-latest
    needs: format-core
    if: github.event_name == 'workflow_dispatch' || needs.format-core.outputs.android == 'true' || needs.format-core.outputs.core == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle CLI
        uses: gradle/actions/setup-gradle@v6.0.1
        with:
          gradle-version: wrapper
          cache-disabled: true

      - name: Build Android
        run: |
          cd android
          ./gradlew build

      - name: Upload Build Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-report
          if-no-files-found: ignore # Don't error if the report doesn't exist
          overwrite: true
          path: android/build/reports/

      - name: Upload APK Artifact
        if: success() # Only upload APK if build succeeds
        uses: actions/upload-artifact@v7
        with:
          name: APK
          compression-level: 9
          if-no-files-found: error
          overwrite: true
          path: android/build/outputs/apk/**/*.apk

  linux:
    runs-on: ubuntu-latest
    needs: format-core
    if: github.event_name == 'workflow_dispatch' || needs.format-core.outputs.linux == 'true' || needs.format-core.outputs.core == 'true'
    steps:
      - name: Do Nothing
        run: echo "Do Nothing"

  windows:
    runs-on: windows-latest
    needs: format-core
    if: github.event_name == 'workflow_dispatch' || needs.format-core.outputs.windows == 'true' || needs.format-core.outputs.core == 'true'
    steps:
      - name: Do Nothing
        run: echo "Do Nothing"
