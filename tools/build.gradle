plugins {
    id 'cpp-application'
    id 'cpp-unit-test'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}
unitTest {
    source.from file('test')
    privateHeaders.from file('test')
}

task runc(dependsOn: 'build') {
    group = 'application'
    doFirst {
        def targetDir = file('converted')
        if (targetDir.exists()) {
            targetDir.delete()
        }
        targetDir.mkdir()
    }
    doLast {
        def targetDir = file('converted/images')
        targetDir.mkdir()
        def sourceDir = 'assets/images'
        fileTree(dir: sourceDir).each { file ->
            def baseName = file.getName().split("\\.")[0]
            def convertedFile = file("${targetDir.name}/${baseName}.bitmap_compress")
            convertedFile.createNewFile()
            exec {
                commandLine 'build/exe/main/debug/tools', file.absolutePath, convertedFile.absolutePath
            }
        }
    }
}

