plugins {
    id 'cpp-application'
    id 'cpp-unit-test'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}
unitTest {
    source.from file('test')
    privateHeaders.from file('test')
}

task runc(type: Exec, dependsOn: 'build') {
    group = 'application'
    description = 'Runs the C++ application after building'

    workingDir 'build/exe/main/debug'
    commandLine './tools', 'arg1', 'arg2'
}

