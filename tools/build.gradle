plugins {
    id 'cpp-application'
    id 'cpp-unit-test'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}
unitTest {
    source.from file('test')
    privateHeaders.from file('test')
}

tasks.register("tries") {
    dependsOn tasks.named("build")
    doLast {
        exec {
            commandLine "${project.buildDir}/main"
            args("Hai", "Hello World")
        }
    }
}
