plugins {
    id 'cpp'
}

model {
    components {
        main(NativeExecutableSpec) {
            sources {
                cpp {
                    source {
                        srcDirs 'main'
                        include '**/*.cpp'
                    }
                }
            }
        }
        test(NativeExecutableUnitTestSpec) {
            sources {
                cpp {
                    source {
                        srcDirs 'test'
                        include '**/*.cpp'
                    }
                }
            }
        }
    }
}

