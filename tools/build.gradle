plugins {
    id 'cpp'
}

model {
    components {
        main(NativeExecutableSpec) {
            sources {
                cpp {
                    source.srcDir 'main'
                }
            }
        }
        test(NativeExecutableSpec) {
            sources {
                cpp {
                    source.srcDir 'test'
                }
            }
        }
    }
}

tasks {
    build.dependsOn model.components.main
    test.dependsOn model.components.test
}
