plugins {
    id 'cpp-application'
    id 'cpp-unit-test'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}
unitTest {
    source.from file('test')
    privateHeaders.from file('test')
}

task runc(type: Exec, dependsOn: 'build') {
    group = 'application'
    doFirst {
        def targetDir = 'converted'
        if (file(targetDir).exists()) {
            exec {
                commandLine 'rm', '-rf', targetDir
            }
        }
        exec {
            commandLine 'mkdir', targetDir
        }
    }
    doLast {
        def targetDir = 'converted/images'
        exec {
            commandLine 'mkdir', targetDir
        }
        def sourceDir = 'assets/images'
        fileTree(dir: sourceDir).each { file ->
            def baseName = file.nameWithoutExtension
            def convertedFile = file("$targetDir/${baseName}.bitmap_compress")
            exec {
                commandLine 'touch', convertedFile.absolutePath
                commandLine 'build/exe/main/debug/tools', file.absolutePath, convertedFile.absolutePath
            }
        }
    }
}

