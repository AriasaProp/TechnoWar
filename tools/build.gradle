plugins {
    id 'cpp-application'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}

tasks.named<Test>("test") {
    dependsOn tasks.named("build")
    doLast {
        def appPath = "${project.buildDir}/tools"
        exec {
            commandLine appPath
            args("Hai", "Hello World")
        }
    }
}
