plugins {
    id 'cpp-application'
    id 'cpp-unit-test'
}

application {
		source.from file('main')
		privateHeaders.from file('main')
}
unitTest {
    source.from file('test')
    privateHeaders.from file('test')
}

task runc(type: Exec, dependsOn: 'build') {
    group = 'application'
    commandLine 'rm', '-rf', 'converted'
    commandLine 'mkdir', 'converted'
		commandLine 'mkdir', 'converted/images'
    //images conversion
    commandLine 'for file in assets/images/*; do\',
    'converted_file="converted/images/${base_name%.*}.bitmap_compress";\',
    'touch "$converted_file";\',
    'build/exe/main/debug/tools "$file" "$converted_file";\',
    'done;\'
}


