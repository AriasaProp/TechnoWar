apply plugin: 'com.android.application'

android {
    signingConfigs {
        mainSign {
            storeFile file('sign.keystore')
            storePassword '123456'
            keyAlias = 'demo'
            keyPassword '123456'
        }
    }
    compileSdkVersion 32
    ndkVersion "25.2.9519653"
    defaultConfig {
        applicationId "com.ariasaproject.technowar"
        minSdkVersion 24
        targetSdkVersion 32
        versionCode 1
        versionName "1.0"
        signingConfig signingConfigs.mainSign
        multiDexEnabled true
        
        buildConfigField "String", "CMAKE_VERSION", "\"" + System.getenv("CMAKE_VERSION") + "\""
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
    		cmake {
    				version "$cmake_version"
    				path "src/main/cpp/CMakeLists.txt"
    		}
    }
    
    def cmakeVersion = System.getenv("CMAKE_VERSION")
}

dependencies {}
