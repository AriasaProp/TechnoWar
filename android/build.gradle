apply plugin: 'com.android.application'

def workflowHash = System.getenv('WORKFLOW_HASH')
def workflowTime = System.getenv('WORKFLOW_TIME')
def branchName = System.getenv('BRANCH_NAME')

android {
    signingConfigs {
        mainSign {
            storeFile file('sign.keystore')
            storePassword '123456'
            keyAlias = 'demo'
            keyPassword '123456'
        }
    }
    compileSdkVersion 33
    ndkVersion "25.2.9519653"
    namespace "com.ariasaproject.technowar"
    defaultConfig {
        applicationId "com.ariasaproject.technowar"
        minSdkVersion 24
        targetSdkVersion 33
        versionCode 1
        versionName "0"
        signingConfig signingConfigs.mainSign
        multiDexEnabled true
        buildConfigField "String", "CMAKE_VERSION", "\"" + System.getenv("CMAKE_VERSION") + "\""
        proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
    
    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
        }
    }
    externalNativeBuild {
        cmake {
            arguments "-DWORKFLOW_HASH=${workflowHash}", "-DWORKFLOW_TIME=${workflowTime}", "-DBRANCH_NAME=${branchName}"
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}

dependencies {}
